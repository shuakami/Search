name: pages

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "src/**"
      - "bench/prepare-datasets.ts"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: cache benchmark corpora
        uses: actions/cache@v4
        with:
          path: bench/datasets/cache
          key: bench-corpora-v2
      - name: prepare benchmark corpora (fetched once, then cached)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm bench:datasets
      - run: pnpm --filter shuakami-search-demo prepare:packs
      - run: pnpm --filter shuakami-search-demo build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
